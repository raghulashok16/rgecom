<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Circle background -->
  <circle cx="50" cy="50" r="50" fill="#1C1C2E"/>

  <!-- Arrow shaft (bottom-left to top-right) -->
  <line x1="22" y1="78" x2="72" y2="20"
        stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Arrow head (top-right) -->
  <polygon points="72,20 55,22 70,35" fill="white"/>

  <!-- Letter R -->
  <text x="20" y="68"
        font-family="Georgia, serif"
        font-size="36"
        font-weight="900"
        font-style="italic"
        fill="white"
        letter-spacing="-2">R</text>

  <!-- Letter G -->
  <text x="46" y="72"
        font-family="Georgia, serif"
        font-size="32"
        font-weight="900"
        font-style="italic"
        fill="white"
        letter-spacing="-2">G</text>
</svg>
